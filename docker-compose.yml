version: '3.8'

services:
  # Example MySQL database for testing
  mysql:
    image: mysql:8.0
    container_name: dbu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: example_db
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Example PostgreSQL database for testing
  postgres:
    image: postgres:15
    container_name: dbu-postgres
    environment:
      POSTGRES_DB: example_db
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d example_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Example MongoDB for testing
  mongodb:
    image: mongo:7
    container_name: dbu-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: example_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database backup utility
  dbu:
    build: .
    container_name: dbu-utility
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backups:/backups
      - ./config.example.yaml:/home/dbbackup/dbu.yaml
    environment:
      - BACKUP_DIR=/backups
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    command: ["--help"]
    profiles:
      - tools

volumes:
  mysql_data:
  postgres_data:
  mongodb_data:
